<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Operator Terminal - Pilkades Victory System</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen flex flex-col antialiased">

  <!-- MOBILE COMPACT HEADER -->
  <header class="w-full bg-navy-dark text-white px-5 py-4 flex items-center justify-between sticky top-0 z-50 shadow-md">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 rounded-lg bg-gradient-gold flex items-center justify-center text-navy-dark font-black text-base shadow">
        <i class="fa-solid fa-feather-pointed text-xs"></i>
      </div>
      <div>
        <span class="text-xs font-black block tracking-wide">PVS FIELD HUB</span>
        <span class="text-[8px] text-gold font-bold uppercase tracking-widest" id="timses-profile-name">Petugas Lapangan</span>
      </div>
    </div>
    
    <!-- KUNCI PERBAIKAN: Ditambahkan ID unik 'btn-timses-logout' untuk mengikat memori JavaScript -->
    <button id="btn-timses-logout" class="w-9 h-9 bg-slate-800/80 text-red-400 rounded-xl border border-white/5 flex items-center justify-center text-xs active:scale-95 transition">
      <i class="fa-solid fa-power-off"></i>
    </button>
  </header>

  <!-- MOBILE CONTROL WORKSPACE CONTAINER -->
  <main class="flex-1 p-5 space-y-5 max-w-md w-full mx-auto">
    
    <div class="w-full bg-gradient-premium rounded-2xl p-5 text-white relative overflow-hidden shadow border border-slate-800">
      <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#D4AF37_1px,transparent_1px)] [background-size:16px_16px]"></div>
      <span class="text-gold font-bold text-[9px] uppercase tracking-widest block">Kampanye Taktis</span>
      <h3 class="text-base font-black mt-1 leading-snug">KAWAL SUARA, KUNCI KEMENANGAN DESA</h3>
    </div>

    <!-- ENTRY FORM DATA PEREKAMAN SUARA KONSTITUEN -->
    <div class="bg-white p-5 rounded-2xl border border-slate-200/80 shadow-sm space-y-4">
      <div class="border-b border-slate-100 pb-2">
        <h4 class="text-xs font-black text-navy-dark uppercase tracking-wider"><i class="fa-solid fa-user-plus text-gold mr-1.5"></i> Pendataan Warga DPT</h4>
      </div>

      <div id="field-alert" class="hidden p-4 rounded-xl text-xs font-bold shadow-sm"></div>

      <form id="form-voter-submission" onsubmit="if(window.appEngine) { window.appEngine.field.submitVoter(event); } else { event.preventDefault(); }" class="space-y-4">
        <div>
          <label class="block text-[9px] font-extrabold uppercase tracking-widest text-slate-500 mb-1.5">Nomor Induk Kependudukan (NIK)</label>
          <input type="number" id="field-voter-nik" required pattern="[0-8]*" inputmode="numeric"
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-950 text-xs font-bold text-slate-800" 
            placeholder="Ketik 16 digit NIK KTP Warga">
        </div>

        <div>
          <label class="block text-[9px] font-extrabold uppercase tracking-widest text-slate-500 mb-1.5">Klasifikasi Orientasi Dukungan</label>
          <select id="field-voter-class" required 
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-950 text-xs font-bold text-slate-800">
            <option value="" disabled selected>Pilih status orientasi...</option>
            <option value="PRO" class="text-emerald-600 font-bold">PRO (Basis Massa Dukungan)</option>
            <option value="KONTRA" class="text-red-500 font-bold">KONTRA (Massa Oposisi)</option>
            <option value="RAGU-RAGU" class="text-amber-500 font-bold">RAGU-RAGU / BELUM PUTUSKAN</option>
          </select>
        </div>

        <button type="submit" 
          class="w-full py-3.5 px-5 bg-navy-dark hover:bg-navy-light text-gold font-extrabold text-xs tracking-widest rounded-xl transition shadow transform active:scale-[0.97] flex items-center justify-center gap-2">
          <span>AMANKAN DATA PEMILIH</span>
          <i class="fa-solid fa-paper-plane text-[10px]"></i>
        </button>
      </form>
    </div>
  </main>
</body>
</html>
