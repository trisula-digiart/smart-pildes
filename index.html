<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <!-- Proteksi viewport ketat: mencegah zoom cubit (pinch-to-zoom) di mobile agar presisi dan kokoh -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pilkades Victory System - Decoupled Enterprise</title>
  
  <!-- Tailwind CSS Engine CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Plus Jakarta Sans untuk tipografi premium -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome Pro Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Chart.js untuk kebutuhan visualisasi grafik real-count di admin -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- CSS Kustom yang berisi variabel warna, gradasi Deep Navy & Gold, serta rule cetak/print -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen flex flex-col antialiased selection:bg-blue-900 selection:text-white">

  <!-- Elemen #app-root ini adalah jangkar utama tempat login, admin dashboard, dan timses dashboard disuntik secara dinamis -->
  <div id="app-root" class="w-full flex-1 flex flex-col">
    <!-- Tampilan loading screen awal sebelum session token diverifikasi oleh app.js -->
    <div id="pvs-global-loader" class="flex-1 flex flex-col items-center justify-center p-8 bg-[#0B192C] text-white">
      <div class="relative flex items-center justify-center mb-6">
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-t-transparent border-[#D4AF37]"></div>
        <i class="fa-solid fa-crown text-[#D4AF37] absolute text-xl"></i>
      </div>
      <p class="text-xs tracking-[0.25em] text-[#D4AF37] font-bold uppercase animate-pulse">Menghubungkan ke Trisula Kernel...</p>
    </div>
  </div>

  <!-- File app.js bertindak sebagai mesin async, router, session checker, dan jembatan ke GAS API -->
  <script src="app.js"></script>
</body>
</html>
